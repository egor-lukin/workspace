---

- hosts: local
  roles:
    - role: angstwad.docker_ubuntu
      docker_group_members: [azx]
      apt_key_url: "https://download.docker.com/linux/ubuntu/gpg"
      become: yes

    - role: packages
      tags: 'packages'

    - role: configs

    - role: keybindings

    - role: services
      become: yes

    - role: rvm.ruby
      rvm1_rubies: ['ruby-2.5.1', 'ruby-3.0.0']
      rvm1_install_flags: '--auto-dotfiles'
      rvm1_install_path: ~/.rvm
      rvm1_user: azx
      tags: ruby
      become: yes
